<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>本の登録 | ISBNチェッカー</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero compact">
        <p class="eyebrow">Register Book</p>
        <h1>本の登録</h1>
        <p class="lead">まず ISBN を入力し、読み込んだ情報を確認してから登録・更新・削除を行います。</p>
      </header>

      <nav class="app-nav">
        <a class="nav-link" href="/">ホーム</a>
        <a class="nav-link active" href="/register.html">本の登録</a>
        <a class="nav-link" href="/books.html">一覧を見る</a>
      </nav>

      <section class="panel">
        <form id="book-form" class="form-grid">
          <label>
            <span>ISBN</span>
            <div class="input-with-button">
              <input id="book-isbn" name="isbn" placeholder="9784101010014" required />
              <button id="lookup-button" type="button">ISBNから取得</button>
            </div>
          </label>

          <div id="register-panel" class="register-panel hidden">
            <p id="register-mode-label" class="section-label"></p>

            <div class="book-form-layout">
              <div class="book-form-fields">
                <label>
                  <span>タイトル</span>
                  <input id="book-title" name="title" placeholder="本のタイトル" required />
                </label>

                <label>
                  <span>著者</span>
                  <input id="book-author" name="author" placeholder="著者名" />
                </label>

                <label>
                  <span>出版社</span>
                  <input id="book-publisher" name="publisher" placeholder="出版社名" />
                </label>

                <label>
                  <span>出版年月日</span>
                  <input id="book-published-date" name="publishedDate" type="date" />
                </label>

                <label>
                  <span>購入日</span>
                  <input id="book-purchase-date" name="purchaseDate" type="date" />
                </label>

                <input id="book-cover-url" name="coverUrl" type="hidden" />

                <div class="action-row">
                  <button id="save-button" type="submit" class="submit-button">確認して登録</button>
                  <button id="delete-book-button" type="button" class="delete-button hidden">削除する</button>
                  <button id="cancel-register-button" type="button" class="ghost-button">やり直す</button>
                </div>
              </div>

              <div class="book-form-preview">
                <div class="cover-preview empty" id="cover-preview">
                  <span>表紙プレビューはここに表示されます。</span>
                </div>
              </div>
            </div>
          </div>
        </form>

        <p id="lookup-message" class="inline-message"></p>
        <p id="form-message" class="inline-message"></p>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
