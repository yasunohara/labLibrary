<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ISBN所蔵チェッカー</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <p class="eyebrow">Local Library App</p>
        <h1>ISBN所蔵チェッカー</h1>
        <p class="lead">
          ISBNで本を確認、登録、一覧管理できるローカルWebアプリです。
        </p>
      </header>

      <nav class="app-nav">
        <a class="nav-link active" href="/">ホーム</a>
        <a class="nav-link" href="/check.html">所蔵確認</a>
        <a class="nav-link" href="/register.html">本を登録</a>
        <a class="nav-link" href="/books.html">一覧を見る</a>
      </nav>

      <section class="panel home-grid">
        <a class="feature-card" href="/check.html">
          <h2>所蔵確認</h2>
          <p>ISBNを入力して、すでに持っている本かどうかを確認します。</p>
        </a>

        <a class="feature-card" href="/register.html">
          <h2>本を登録</h2>
          <p>Google Books から情報を取得しながら、新しい本を登録します。</p>
        </a>

        <a class="feature-card" href="/books.html">
          <h2>所蔵一覧</h2>
          <p>登録済みの本を、表紙つきで一覧表示して管理します。</p>
        </a>
      </section>
    </main>
  </body>
</html>
