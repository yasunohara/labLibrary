<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ISBNチェッカー</title>
    <link rel="stylesheet" href="/style.css" />

  <body>
    <main class="page">
      <header class="hero">

      <nav class="app-nav">
        <a class="nav-link active" href="/">ホーム</a>
