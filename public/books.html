<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>一覧を見る | ISBNチェッカー</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero compact">
        <p class="eyebrow">Library Shelf</p>
        <h1>一覧を見る</h1>
        <p class="lead">表紙一覧と表形式の一覧を切り替えながら、本の詳細を確認できます。</p>
      </header>

      <nav class="app-nav">
        <a class="nav-link" href="/">ホーム</a>
        <a class="nav-link" href="/register.html">本の登録</a>
        <a class="nav-link active" href="/books.html">一覧を見る</a>
      </nav>

      <section class="panel">
        <div class="view-toggle" role="tablist" aria-label="一覧表示の切り替え">
          <button id="view-shelf" class="view-toggle-button active" type="button" data-view="shelf">画像一覧</button>
          <button id="view-table" class="view-toggle-button" type="button" data-view="table">表一覧</button>
        </div>
        <div class="filter-grid">
          <label class="filter-search">
            <span>絞り込み検索</span>
            <input id="filter-query" type="search" placeholder="キーワードを入力" />
          </label>
          <fieldset class="filter-scope">
            <legend>検索対象</legend>
            <label class="filter-option">
              <input type="radio" name="filter-scope" value="title" checked />
              <span>タイトル</span>
            </label>
            <label class="filter-option">
              <input type="radio" name="filter-scope" value="author" />
              <span>著者</span>
            </label>
            <label class="filter-option">
              <input type="radio" name="filter-scope" value="isbn" />
              <span>ISBN</span>
            </label>
          </fieldset>
        </div>
        <div id="book-list" class="book-list empty">まだ本は登録されていません。</div>
        <p id="form-message" class="inline-message"></p>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
