<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>所蔵確認 | ISBN所蔵チェッカー</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero compact">
        <p class="eyebrow">Check Ownership</p>
        <h1>所蔵確認</h1>
        <p class="lead">ISBNを入力して、蔵書に登録済みかどうかを確認します。</p>
      </header>

      <nav class="app-nav">
        <a class="nav-link" href="/">ホーム</a>
        <a class="nav-link active" href="/check.html">所蔵確認</a>
        <a class="nav-link" href="/register.html">本を登録</a>
        <a class="nav-link" href="/books.html">一覧を見る</a>
      </nav>

      <section class="panel">
        <form id="check-form" class="form-grid">
          <label>
            <span>ISBN</span>
            <input id="check-isbn" name="isbn" placeholder="9784101010014" required />
          </label>
          <button type="submit">確認する</button>
        </form>

        <div id="check-result" class="result-card neutral">
          ここに確認結果が表示されます。
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
